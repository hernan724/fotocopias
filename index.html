<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Fotocopias</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#111,#222);
      color:white;
    }

    .card{
      width:90%;
      max-width:420px;
      background:#1f1f1f;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-top:0;
      font-size:2rem;
    }

    .info{
      background:#2a2a2a;
      padding:15px;
      border-radius:12px;
      margin-bottom:20px;
      line-height:1.6;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-size:1.1rem;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:1.1rem;
      outline:none;
      margin-bottom:20px;
    }

    .resultado{
      background:#121212;
      border:2px solid #444;
      padding:20px;
      border-radius:15px;
    }

    .resultado p{
      margin:10px 0;
      font-size:1.1rem;
    }

    .precio{
      font-size:2rem !important;
      font-weight:bold;
      color:#00ff95;
      text-align:center;
      margin-top:20px !important;
    }

    .descuento{
      color:#ffd54a;
      font-weight:bold;
    }

    .maximo{
      color:#ff7070;
      text-align:center;
      margin-top:10px;
      display:none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>📄 Fotocopias</h1>

    <div class="info">
      Precio base por copia: <strong>$250</strong><br>
      Máximo permitido: <strong>40 hojas</strong><br>
      Descuentos progresivos por cantidad
    </div>

    <label for="copias">Cantidad de copias:</label>

    <input 
      type="number" 
      id="copias" 
      min="1" 
      max="40"
      value="1"
    >

    <div class="maximo" id="maximo">
      El máximo es 40 hojas
    </div>

    <div class="resultado">
      <p>Precio por copia: <strong id="precioUnidad">$250</strong></p>

      <p class="descuento">
        Descuento aplicado: <span id="descuento">0%</span>
      </p>

      <p class="precio">
        Total: <span id="total">$300</span>
      </p>
    </div>
  </div>

  <script>
    const input = document.getElementById("copias");
    const total = document.getElementById("total");
    const descuento = document.getElementById("descuento");
    const precioUnidad = document.getElementById("precioUnidad");
    const maximo = document.getElementById("maximo");

    const PRECIO_BASE = 250;

    function obtenerDescuento(cantidad){

      if(cantidad >= 35) return 35;
      if(cantidad >= 30) return 30;
      if(cantidad >= 25) return 25;
      if(cantidad >= 20) return 20;
      if(cantidad >= 15) return 15;
      if(cantidad >= 10) return 10;
      if(cantidad >= 5) return 5;

      return 0;
    }

    function redondearCentena(valor){
      return Math.round(valor / 100) * 100;
    }

    function calcular() {

      let cantidad = parseInt(input.value) || 1;

      if(cantidad > 40){
        cantidad = 40;
        input.value = 40;
        maximo.style.display = "block";
      } else {
        maximo.style.display = "none";
      }

      const descuentoPorcentaje = obtenerDescuento(cantidad);

      const precioFinalUnidad =
        PRECIO_BASE * (1 - descuentoPorcentaje / 100);

      let precioTotal =
        cantidad * precioFinalUnidad;

      // Redondear a la centena más cercana
      precioTotal = redondearCentena(precioTotal);

      descuento.textContent =
        descuentoPorcentaje + "%";

      precioUnidad.textContent =
        "$" + precioFinalUnidad.toFixed(0);

      total.textContent =
        "$" + precioTotal.toLocaleString("es-AR");
    }

    input.addEventListener("input", calcular);

    calcular();
  </script>

</body>
</html>
